<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Sky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'DM Sans', sans-serif;
    cursor: crosshair;
  }

  #sky-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #landscape-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── Toggle tab ──────────────────────────────────────────── */
  #panel-toggle {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 20;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-radius: 3px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: rgba(180,200,255,0.65);
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
    user-select: none;
  }

  #panel-toggle:hover {
    color: rgba(180,200,255,0.95);
    border-color: rgba(255,255,255,0.25);
  }

  /* ── Control panel ───────────────────────────────────────── */
  #control-panel {
    position: absolute;
    top: 60px;
    right: 24px;
    z-index: 15;
    width: 340px;
    background: rgba(0,0,0,0.60);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(14px);
    border-radius: 4px;
    padding: 18px 20px 16px;
    transition: opacity 0.25s, transform 0.25s;
  }

  #control-panel.hidden {
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
  }

  /* Location + coords row */
  #meta-location {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.13em;
    color: rgba(160,180,240,0.55);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* Date + time */
  #meta-datetime {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 300;
    color: rgba(215,228,255,0.92);
    margin-bottom: 18px;
    letter-spacing: 0.01em;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 14px 0;
  }

  /* Slider rows */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .slider-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.10em;
    color: rgba(150,170,220,0.5);
    text-transform: uppercase;
    width: 32px;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.14);
    outline: none;
    border-radius: 1px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: rgba(180,200,255,0.88);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(150,180,255,0.7);
  }

  /* Button row */
  .btn-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 4px;
  }

  .ctrl-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.08em;
    background: none;
    border: 1px solid rgba(255,255,255,0.13);
    color: rgba(180,200,255,0.45);
    padding: 4px 9px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .ctrl-btn:hover {
    border-color: rgba(180,200,255,0.45);
    color: rgba(180,200,255,0.85);
  }

  .ctrl-btn.active {
    border-color: rgba(180,200,255,0.75);
    color: rgba(180,200,255,1);
    box-shadow: 0 0 8px rgba(150,180,255,0.25);
  }

  /* Star tooltip */
  #star-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(180,200,255,0.18);
    backdrop-filter: blur(8px);
    border-radius: 3px;
    padding: 7px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: rgba(220,232,255,0.9);
    display: none;
    z-index: 20;
    white-space: nowrap;
  }

  #star-tooltip .mag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: rgba(150,170,220,0.55);
    display: block;
    margin-top: 2px;
  }
</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>
<canvas id="landscape-canvas"></canvas>
<div id="star-tooltip"><span id="tt-name"></span><span class="mag" id="tt-mag"></span></div>

<!-- Toggle tab -->
<div id="panel-toggle" onclick="togglePanel()">Controls</div>

<!-- Collapsible control panel -->
<div id="control-panel">
  <div id="meta-location">—</div>
  <div id="meta-datetime">—</div>

  <div class="slider-row">
    <span class="slider-label">Hour</span>
    <input type="range" id="hour-slider" min="0" max="23.99" step="0.01" value="22">
  </div>
  <div class="slider-row">
    <span class="slider-label">Day</span>
    <input type="range" id="day-slider" min="0" max="364" step="1" value="0">
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="ctrl-btn" id="live-btn" onclick="setLive(!isLive)">● Live</button>
    <button class="ctrl-btn" onclick="setSpeed(0)"     id="sp0">Pause</button>
    <button class="ctrl-btn" onclick="setSpeed(60)"    id="sp1">1×</button>
    <button class="ctrl-btn" onclick="setSpeed(3600)"  id="sp2">60×</button>
    <button class="ctrl-btn" onclick="setSpeed(86400)" id="sp3">Day</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION — edit these values to match your photograph
// ═══════════════════════════════════════════════════════════

// ── Location ───────────────────────────────────────────────
const LAT_DEG  =  42.3601;    // latitude in decimal degrees (+ = North)
const LON_DEG  = -71.0589;    // longitude in decimal degrees (+ = East)
const PLACE    = 'Boston, MA'; // displayed in the panel header

// ── Horizon position ───────────────────────────────────────
// Fraction of canvas height where the mathematical horizon sits.
// 0.75 = more landscape, 0.90 = more sky.
const HORIZON_FRAC = 0.82;

// ── Silhouette image ───────────────────────────────────────
// PNG in the same folder. Transparent sky, solid dark landscape.
// Falls back to procedural mountains if not found.
const SILHOUETTE_FILE     = 'silhouette.png';
const SILHOUETTE_OFFSET_Y = 0;   // px: + shifts image down, - shifts up

// ── Light-pollution glow ───────────────────────────────────
const SILHOUETTE_GLOW          = true;
const SILHOUETTE_GLOW_OFFSET_Y = 0;  // px: + moves glow down, - moves up

// ── Camera / photo metadata ────────────────────────────────
// Horizontal field of view in degrees.
// Derive from focal length: FOV = 2·atan(sensor_w / (2·focal_len)) · 180/π
// Full-frame examples: 14mm→104° 24mm→74° 35mm→54° 50mm→40° 85mm→24°
const FOV_DEG = 110;

// Compass bearing at centre of frame (degrees). 0=N 90=E 180=S 270=W
const COMPASS_BEARING = 180;

// ═══════════════════════════════════════════════════════════

// Derived constant used by astronomy functions
const LAT = LAT_DEG * Math.PI / 180;
const LON = LON_DEG;
const SKY_STARS = 2500;

// Spectral colour map — OBAFGKM (hot blue → cool red)
const SPECTRAL_COLORS = {
  O: 'rgba(155,180,255,1)',
  B: 'rgba(185,210,255,1)',
  A: 'rgba(220,232,255,1)',
  F: 'rgba(248,245,220,1)',
  G: 'rgba(255,238,180,1)',
  K: 'rgba(255,210,130,1)',
  M: 'rgba(255,175,95,1)',
};

const NAMED_STARS = [

  { name: "Adhara",         ra:  6.9771, dec: -28.972, mag:  1.50, sp: 'B' },
  { name: "Castor",         ra:  7.5766, dec:  31.888, mag:  1.58, sp: 'A' },

  { name: "Miaplacidus",    ra:  9.2200, dec: -69.717, mag:  1.68, sp: 'A' },
  { name: "Alnilam",        ra:  5.6036, dec:  -1.202, mag:  1.69, sp: 'B' },
  { name: "Alnair",         ra: 22.1374, dec: -46.961, mag:  1.74, sp: 'B' },
  { name: "Alioth",         ra: 12.9004, dec:  55.960, mag:  1.76, sp: 'A' },

  { name: "Dubhe",          ra: 11.0621, dec:  61.751, mag:  1.79, sp: 'K' },

  { name: "Kaus Australis", ra: 18.4028, dec: -34.384, mag:  1.85, sp: 'B' },
  { name: "Avior",          ra:  8.3752, dec: -59.509, mag:  1.86, sp: 'K' },
  { name: "Alkaid",         ra: 13.7923, dec:  49.313, mag:  1.86, sp: 'B' },

  { name: "Peacock",        ra: 20.4274, dec: -56.735, mag:  1.94, sp: 'B' },

// Milky Way spine
const MW_SPINE = [
  { ra: 21.5, dec:  57, w: 0.11, b: 0.028 },
  { ra: 20.7, dec:  46, w: 0.13, b: 0.038 },
  { ra: 20.0, dec:  36, w: 0.12, b: 0.032 },
  { ra: 19.4, dec:  24, w: 0.11, b: 0.030 },
  { ra: 18.9, dec:  12, w: 0.10, b: 0.028 },
  { ra: 18.5, dec:   0, w: 0.10, b: 0.030 },
  { ra: 18.0, dec: -12, w: 0.12, b: 0.038 },
  { ra: 17.8, dec: -22, w: 0.14, b: 0.050 },
  { ra: 17.76,dec: -29, w: 0.16, b: 0.065 },
  { ra: 17.5, dec: -35, w: 0.15, b: 0.055 },
  { ra: 16.5, dec: -45, w: 0.13, b: 0.038 },
  { ra: 22.5, dec:  62, w: 0.09, b: 0.022 },
  { ra: 23.5, dec:  62, w: 0.09, b: 0.020 },
  { ra:  1.0, dec:  60, w: 0.09, b: 0.022 },
  { ra:  2.5, dec:  57, w: 0.09, b: 0.025 },
  { ra:  3.5, dec:  51, w: 0.09, b: 0.022 },
  { ra:  4.5, dec:  40, w: 0.09, b: 0.020 },
  { ra:  6.5, dec:  22, w: 0.09, b: 0.020 },
  { ra:  7.0, dec:  10, w: 0.09, b: 0.018 },
  { ra:  7.5, dec:   0, w: 0.09, b: 0.016 },
  { ra:  8.0, dec: -10, w: 0.09, b: 0.015 },
];

// ─── STATE ─────────────────────────────────────────────────
let simTime      = new Date();
let speed        = 60;
let isLive       = true;
let lastRealTime = Date.now();
let stars        = [];
let mouseX = 0, mouseY = 0;
let hoveredStar  = null;
let silhouetteImg = null;
let panelVisible  = true;

// ─── SILHOUETTE LOADER ─────────────────────────────────────
(function () {
  const img = new Image();
  img.onload  = () => { silhouetteImg = img; drawLandscape(); };
  img.onerror = () => {};
  img.src = SILHOUETTE_FILE;
})();

// ─── CANVAS SETUP ──────────────────────────────────────────
const skyCanvas  = document.getElementById('sky-canvas');
const skyCtx     = skyCanvas.getContext('2d');
const landCanvas = document.getElementById('landscape-canvas');
const landCtx    = landCanvas.getContext('2d');

function resize() {
  skyCanvas.width  = landCanvas.width  = window.innerWidth;
  skyCanvas.height = landCanvas.height = window.innerHeight;
  drawLandscape();
}
window.addEventListener('resize', resize);

// ─── PANEL TOGGLE ──────────────────────────────────────────
function togglePanel() {
  panelVisible = !panelVisible;
  const panel  = document.getElementById('control-panel');
  const toggle = document.getElementById('panel-toggle');
  panel.classList.toggle('hidden', !panelVisible);
  toggle.textContent = panelVisible ? 'Hide' : 'Controls';
}

// ─── ASTRONOMY ─────────────────────────────────────────────
function julianDate(d) {
  return d / 86400000 + 2440587.5;
}

function lst(date) {
  const jd   = julianDate(date);
  const T    = (jd - 2451545.0) / 36525;
  let gmst   = 280.46061837 + 360.98564736629 * (jd - 2451545)
             + 0.000387933 * T * T - T * T * T / 38710000;
  gmst = ((gmst % 360) + 360) % 360;
  return (gmst + LON + 360) % 360;
}

function raDecToAltAz(ra_hours, dec_deg, date) {
  const ra  = ra_hours * 15;
  const dec = dec_deg * Math.PI / 180;
  const ha  = ((lst(date) - ra) + 360) % 360;
  const haR = ha * Math.PI / 180;

  const sinAlt = Math.sin(dec) * Math.sin(LAT) +
                 Math.cos(dec) * Math.cos(LAT) * Math.cos(haR);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt)));

  const cosAz = (Math.sin(dec) - Math.sin(alt) * Math.sin(LAT)) /
                (Math.cos(alt) * Math.cos(LAT));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz)));
  if (Math.sin(haR) > 0) az = 2 * Math.PI - az;

  return { alt: alt * 180 / Math.PI, az: az * 180 / Math.PI };
}

function projectStar(alt, az, w, h) {
  const horizonY = h * HORIZON_FRAC;
  let daz = az - COMPASS_BEARING;
  if (daz >  180) daz -= 360;
  if (daz < -180) daz += 360;
  const x = w / 2 + (w / 2) * (daz / (FOV_DEG / 2));
  const y = horizonY - (horizonY * 1.05) * (alt / 85);
  return { x, y };
}

// ─── STAR GENERATION ───────────────────────────────────────
function randomStarColor(i) {
  const r = Math.sin(i * 0.3 + 1) * 0.5 + 0.5;
  if (r < 0.05) return SPECTRAL_COLORS.O;
  if (r < 0.18) return SPECTRAL_COLORS.B;
  if (r < 0.35) return SPECTRAL_COLORS.A;
  if (r < 0.55) return SPECTRAL_COLORS.F;
  if (r < 0.72) return SPECTRAL_COLORS.G;
  if (r < 0.88) return SPECTRAL_COLORS.K;
  return SPECTRAL_COLORS.M;
}

function initStars() {
  stars = [];
  for (const s of NAMED_STARS) {
    stars.push({
      ra: s.ra, dec: s.dec, mag: s.mag,
      name: s.name, named: true,
      color: SPECTRAL_COLORS[s.sp] || SPECTRAL_COLORS.A
    });
  }
  const seed = 42;
  function seededRand(i) {
    const x = Math.sin(i * 127.1 + seed * 311.7) * 43758.5453;
    return x - Math.floor(x);
  }
  for (let i = 0; i < SKY_STARS; i++) {
    const ra     = seededRand(i * 3) * 24;
    const sinDec = seededRand(i * 3 + 1) * 2 - 1;
    const decDeg = Math.asin(sinDec) * 180 / Math.PI;
    if (decDeg < -55) continue;
    const mag = 2.0 + seededRand(i * 3 + 2) * 4.5;
    stars.push({ ra, dec: decDeg, mag, named: false, color: randomStarColor(i) });
  }
}

// ─── SKY RENDERING ─────────────────────────────────────────
function drawSky() {
  const w = skyCanvas.width;
  const h = skyCanvas.height;
  const horizonY = h * HORIZON_FRAC;

  skyCtx.clearRect(0, 0, w, h);

  const skyGrad = skyCtx.createLinearGradient(0, 0, 0, horizonY);
  skyGrad.addColorStop(0,    '#01030f');
  skyGrad.addColorStop(0.35, '#02061a');
  skyGrad.addColorStop(0.7,  '#050d2a');
  skyGrad.addColorStop(0.9,  '#0a1535');
  skyGrad.addColorStop(1,    '#0d1a3a');
  skyCtx.fillStyle = skyGrad;
  skyCtx.fillRect(0, 0, w, horizonY + 10);

  const pollGrad = skyCtx.createLinearGradient(0, horizonY - h * 0.25, 0, horizonY);
  pollGrad.addColorStop(0,   'rgba(0,0,0,0)');
  pollGrad.addColorStop(0.6, 'rgba(40,18,6,0.15)');
  pollGrad.addColorStop(1,   'rgba(80,35,8,0.45)');
  skyCtx.fillStyle = pollGrad;
  skyCtx.fillRect(0, horizonY - h * 0.25, w, h * 0.25 + 10);

  drawMilkyWay(w, h, horizonY);
  drawStars(w, h, horizonY);

  const vig = skyCtx.createRadialGradient(
    w / 2, horizonY * 0.55, horizonY * 0.3,
    w / 2, horizonY * 0.55, w * 0.75
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.35)');
  skyCtx.fillStyle = vig;
  skyCtx.fillRect(0, 0, w, horizonY);
}

// ─── MILKY WAY ─────────────────────────────────────────────
function drawMilkyWay(w, h, horizonY) {
  const passes = [
    { wMult: 2.2, alpha: 0.45, color: [100, 110, 160] },
    { wMult: 1.2, alpha: 0.55, color: [120, 130, 180] },
    { wMult: 0.5, alpha: 0.50, color: [160, 165, 210] },
  ];
  for (const pass of passes) {
    for (const pt of MW_SPINE) {
      const aa = raDecToAltAz(pt.ra, pt.dec, simTime);
      if (aa.alt < -15) continue;
      const pos = projectStar(aa.alt, aa.az, w, h);
      if (pos.x < -300 || pos.x > w + 300 || pos.y > horizonY + 80) continue;
      const fade = aa.alt < 15 ? aa.alt / 15 : 1;
      const r    = w * pt.w * pass.wMult;
      const a    = pt.b * pass.alpha * fade;
      const [cr, cg, cb] = pass.color;
      const grd = skyCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
      grd.addColorStop(0,   `rgba(${cr},${cg},${cb},${a})`);
      grd.addColorStop(0.4, `rgba(${cr},${cg},${cb},${a * 0.5})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      skyCtx.fillStyle = grd;
      skyCtx.beginPath();
      skyCtx.ellipse(pos.x, pos.y, r, r * 0.65, 0, 0, Math.PI * 2);
      skyCtx.fill();
    }
  }
  const gcAA = raDecToAltAz(17.76, -29, simTime);
  if (gcAA.alt > 5) {
    const gcPos = projectStar(gcAA.alt, gcAA.az, w, h);
    const rng   = (s) => Math.sin(s * 127.1) * 0.5 + 0.5;
    for (let i = 0; i < 180; i++) {
      const ox   = (rng(i * 3)     - 0.5) * w * 0.28;
      const oy   = (rng(i * 3 + 1) - 0.5) * w * 0.18;
      const sz   = rng(i * 3 + 2) * 1.0;
      const a    = rng(i * 5 + 7) * 0.07 + 0.01;
      const fade = Math.max(0, 1 - (ox * ox + oy * oy * 2.5) / (w * w * 0.018));
      if (gcPos.y + oy > horizonY - 5) continue;
      skyCtx.beginPath();
      skyCtx.arc(gcPos.x + ox, gcPos.y + oy, sz, 0, Math.PI * 2);
      skyCtx.fillStyle = `rgba(200,210,240,${a * fade})`;
      skyCtx.fill();
    }
  }
}

// ─── STARS ─────────────────────────────────────────────────
function drawStars(w, h, horizonY) {
  hoveredStar = null;
  for (const star of stars) {
    const aa = raDecToAltAz(star.ra, star.dec, simTime);
    if (aa.alt < -2) continue;
    const pos = projectStar(aa.alt, aa.az, w, h);
    if (pos.x < -10 || pos.x > w + 10 || pos.y > horizonY - 3 || pos.y < 0) continue;

    const extinction   = aa.alt < 15 ? Math.pow((15 - aa.alt) / 15, 1.5) * 0.75 : 0;
    const effectiveMag = star.mag + extinction * 2.5;
    if (effectiveMag > 6.8 && !star.named) continue;

    const radius    = Math.max(0.12, 2.2 * Math.pow(10, -0.38 * effectiveMag / 2.5));
    const baseAlpha = Math.max(0.25, Math.min(1.0, 1.2 - effectiveMag * 0.13));
    const alpha     = baseAlpha * (1 - extinction * 0.85);
    const col       = star.color;

    if (star.mag < 2.2) {
      const strength  = Math.max(0, (2.2 - star.mag) / 2.2);
      const glowR     = radius * (3.5 + strength * 5);
      const glowAlpha = strength * 0.12 * alpha;
      const grd = skyCtx.createRadialGradient(pos.x, pos.y, radius * 0.3, pos.x, pos.y, glowR);
      grd.addColorStop(0,   col.replace('1)', `${glowAlpha * 2})`));
      grd.addColorStop(0.3, col.replace('1)', `${glowAlpha})`));
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      skyCtx.fillStyle = grd;
      skyCtx.beginPath();
      skyCtx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      skyCtx.fill();
    }

    if (star.mag < 1.0 && radius > 0.8) {
      const crd = skyCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius * 2.5);
      crd.addColorStop(0,   col.replace('1)', `${alpha})`));
      crd.addColorStop(0.4, col.replace('1)', `${alpha * 0.8})`));
      crd.addColorStop(1,   col.replace('1)', '0)'));
      skyCtx.fillStyle = crd;
      skyCtx.beginPath();
      skyCtx.arc(pos.x, pos.y, radius * 2.5, 0, Math.PI * 2);
      skyCtx.fill();
    } else {
      skyCtx.beginPath();
      skyCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      skyCtx.fillStyle = col.replace('1)', `${alpha})`);
      skyCtx.fill();
    }

    if (star.named) {
      const dx = mouseX - pos.x, dy = mouseY - pos.y;
      if (dx * dx + dy * dy < 225) {
        hoveredStar = { ...star, x: pos.x, y: pos.y, alt: aa.alt, az: aa.az };
      }
    }
  }
}

// ─── LANDSCAPE ─────────────────────────────────────────────
function drawLandscape() {
  const w = landCanvas.width;
  const h = landCanvas.height;
  landCtx.clearRect(0, 0, w, h);
  const horizonY = h * HORIZON_FRAC;

  // Light-pollution glow — drawn BEFORE silhouette so ridge covers it
  if (SILHOUETTE_GLOW) {
    let glowY = horizonY;
    if (silhouetteImg) {
      const aspect = silhouetteImg.naturalWidth / silhouetteImg.naturalHeight;
      const drawH  = w / aspect;
      const drawY  = h - drawH + SILHOUETTE_OFFSET_Y;
      glowY = drawY + SILHOUETTE_GLOW_OFFSET_Y;
    }

    const amb = landCtx.createLinearGradient(0, glowY - 30, 0, glowY + 10);
    amb.addColorStop(0, 'rgba(0,0,0,0)');
    amb.addColorStop(1, 'rgba(15,8,2,0.6)');
    landCtx.fillStyle = amb;
    landCtx.fillRect(0, glowY - 30, w, 40);

    const glowL = landCtx.createRadialGradient(w * 0.3, glowY, 0, w * 0.3, glowY, w * 0.45);
    glowL.addColorStop(0, 'rgba(90,42,8,0.28)');
    glowL.addColorStop(1, 'rgba(0,0,0,0)');
    landCtx.fillStyle = glowL;
    landCtx.fillRect(0, glowY - 60, w, 80);

    const glowR = landCtx.createRadialGradient(w * 0.72, glowY, 0, w * 0.72, glowY, w * 0.35);
    glowR.addColorStop(0, 'rgba(70,30,5,0.20)');
    glowR.addColorStop(1, 'rgba(0,0,0,0)');
    landCtx.fillStyle = glowR;
    landCtx.fillRect(0, glowY - 60, w, 80);
  }

  // Silhouette — drawn ON TOP of glow
  if (silhouetteImg) {
    const aspect = silhouetteImg.naturalWidth / silhouetteImg.naturalHeight;
    const drawW  = w;
    const drawH  = w / aspect;
    const drawY  = h - drawH + SILHOUETTE_OFFSET_Y;
    landCtx.drawImage(silhouetteImg, 0, drawY, drawW, drawH);
  } else {
    drawMountainLayer(0.38, 0.20, 9,  '#090d1c', 12);
    drawMountainLayer(0.28, 0.16, 7,  '#070a17',  7);
    drawMountainLayer(0.20, 0.11, 6,  '#060812',  3);
    drawMountainLayer(0.12, 0.07, 8,  '#04060e', 19);
    drawMountainLayer(0.06, 0.04, 11, '#03040b',  1);
  }
}

function drawMountainLayer(heightFactor, variance, peaks, color, seed) {
  const w = landCanvas.width;
  const h = landCanvas.height;
  const horizonY = h * HORIZON_FRAC;
  const numPts   = peaks * 4 + 2;
  const points   = [];
  for (let i = 0; i <= numPts; i++) {
    const x = (i / numPts) * w;
    let y;
    if (i === 0 || i === numPts) {
      y = horizonY;
    } else {
      const base   = horizonY - h * heightFactor;
      const noise  = (Math.sin(i * seed * 1.3 + seed) * 0.5 + 0.5) * h * variance;
      const noise2 = (Math.sin(i * seed * 2.7 + seed * 1.5) * 0.5 + 0.5) * h * variance * 0.4;
      y = base + noise + noise2;
    }
    points.push({ x, y });
  }
  landCtx.beginPath();
  landCtx.moveTo(0, h);
  landCtx.lineTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    landCtx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
  }
  landCtx.lineTo(w, h);
  landCtx.closePath();
  landCtx.fillStyle = color;
  landCtx.fill();
}

// ─── TOOLTIP ───────────────────────────────────────────────
const tooltip = document.getElementById('star-tooltip');
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function updateTooltip() {
  if (hoveredStar) {
    document.getElementById('tt-name').textContent = hoveredStar.name;
    document.getElementById('tt-mag').textContent  =
      `mag ${hoveredStar.mag.toFixed(2)}  ·  alt ${hoveredStar.alt.toFixed(1)}°`;
    tooltip.style.display = 'block';
    tooltip.style.left    = (hoveredStar.x + 14) + 'px';
    tooltip.style.top     = (hoveredStar.y - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}

// ─── TIME / UI ─────────────────────────────────────────────
const hourSlider  = document.getElementById('hour-slider');
const daySlider   = document.getElementById('day-slider');
const liveBtn     = document.getElementById('live-btn');

// Format lat/lon as a compact string from config variables
function formatLatLon() {
  const latAbs = Math.abs(LAT_DEG).toFixed(2);
  const lonAbs = Math.abs(LON_DEG).toFixed(2);
  const latDir = LAT_DEG >= 0 ? 'N' : 'S';
  const lonDir = LON_DEG >= 0 ? 'E' : 'W';
  return `${PLACE}  ·  ${latAbs}°${latDir}  ${lonAbs}°${lonDir}`;
}

function setLive(v) {
  isLive = v;
  liveBtn.classList.toggle('active', v);
  if (v) { simTime = new Date(); syncSlidersToTime(); }
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.ctrl-btn').forEach(b => {
    if (!b.id || b.id === 'live-btn') return;
    b.classList.remove('active');
  });
  const ids = { 0: 'sp0', 60: 'sp1', 3600: 'sp2', 86400: 'sp3' };
  if (ids[s]) document.getElementById(ids[s]).classList.add('active');
}

function syncSlidersToTime() {
  const h   = simTime.getHours() + simTime.getMinutes() / 60 + simTime.getSeconds() / 3600;
  const day = Math.floor((simTime - new Date(simTime.getFullYear(), 0, 0)) / 86400000);
  hourSlider.value = h;
  daySlider.value  = Math.min(364, day);
}

function syncTimeToSliders() {
  const day  = parseInt(daySlider.value);
  const hour = parseFloat(hourSlider.value);
  const d    = new Date(simTime.getFullYear(), 0, day + 1);
  d.setHours(Math.floor(hour), Math.round((hour % 1) * 60), 0, 0);
  simTime = d;
}

hourSlider.addEventListener('input', () => { setLive(false); syncTimeToSliders(); });
daySlider.addEventListener('input',  () => { setLive(false); syncTimeToSliders(); });

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function updatePanel() {
  // Location line — always from config variables
  document.getElementById('meta-location').textContent = formatLatLon();

  // Date/time line
  const d    = simTime;
  const h    = d.getHours();
  const m    = d.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12  = (h % 12) || 12;
  document.getElementById('meta-datetime').textContent =
    `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}  ·  ${h12}:${m} ${ampm}`;
}

// ─── MAIN LOOP ─────────────────────────────────────────────
setLive(true);
setSpeed(60);
initStars();
resize();

function loop() {
  const now = Date.now();
  const dt  = (now - lastRealTime) / 1000;
  lastRealTime = now;

  if (isLive) {
    simTime = new Date();
    syncSlidersToTime();
  } else if (speed > 0) {
    simTime = new Date(simTime.getTime() + dt * speed * 1000);
    syncSlidersToTime();
  }

  updatePanel();
  drawSky();
  updateTooltip();
  requestAnimationFrame(loop);
}

loop();
</script>
